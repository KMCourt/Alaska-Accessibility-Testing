<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPCBA — Mobile Accessibility Checklist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #333;
    }

    /* ── Header ── */
    header {
      background: #1565C0;
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header p  { font-size: 0.8rem; color: #90CAF9; margin-top: 2px; }

    .header-right { display: flex; gap: 10px; align-items: center; }

    .meta-row {
      display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    }
    .meta-row label { font-size: 0.78rem; color: #90CAF9; }
    .meta-row input, .meta-row select {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 4px;
      color: #fff;
      padding: 3px 8px;
      font-size: 0.82rem;
      width: 150px;
    }
    .meta-row select option { color: #333; background: #fff; }
    .meta-row input::placeholder { color: rgba(255,255,255,.45); }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: #1565C0;
      padding: 8px 32px 12px;
      border-bottom: 3px solid #E65100;
    }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 0.78rem; color: #90CAF9; margin-bottom: 5px;
    }
    .progress-bar-bg {
      background: rgba(255,255,255,.15);
      border-radius: 6px; height: 8px; overflow: hidden;
    }
    .progress-bar-fill {
      background: #4caf50; height: 100%;
      border-radius: 6px;
      transition: width .4s ease;
    }

    /* ── Layout ── */
    .layout { display: flex; min-height: calc(100vh - 110px); }

    /* ── Sidebar ── */
    nav {
      width: 230px;
      min-width: 230px;
      background: #fff;
      border-right: 1px solid #dde2e8;
      overflow-y: auto;
      position: sticky;
      top: 110px;
      height: calc(100vh - 110px);
    }
    nav h2 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #888;
      padding: 14px 14px 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      font-size: 0.82rem;
      color: #444;
      text-decoration: none;
      transition: background .15s;
    }
    .nav-item:hover { background: #f5f7fa; }
    .nav-item.active {
      border-left-color: #1565C0;
      background: #E3F2FD;
      color: #1565C0;
      font-weight: 600;
    }
    .nav-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0;
      background: #ddd;
    }
    .nav-item.done   .nav-dot { background: #4caf50; }
    .nav-item.partial .nav-dot { background: #f9a825; }
    .nav-item.fail   .nav-dot { background: #cc0000; }

    /* ── Main content ── */
    main { flex: 1; padding: 24px 28px; }

    .page-section {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .page-header {
      background: #1565C0;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .page-header h3 { font-size: 1rem; font-weight: 700; }
    .page-header .page-meta { font-size: 0.78rem; color: #90CAF9; margin-top: 2px; }
    .page-header .toggle { font-size: 1.1rem; transition: transform .2s; }
    .page-section.collapsed .toggle { transform: rotate(-90deg); }
    .page-body { display: block; padding: 0; }
    .page-section.collapsed .page-body { display: none; }

    /* ── Category group ── */
    .category {
      border-bottom: 1px solid #eee;
      padding: 14px 20px;
    }
    .category:last-child { border-bottom: none; }
    .category-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #1565C0;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .category-title .cat-icon { font-size: 1rem; }

    /* ── Check row ── */
    .check-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 7px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .check-row:last-child { border-bottom: none; }
    .check-label { font-size: 0.88rem; color: #333; line-height: 1.45; }
    .check-label .hint { font-size: 0.78rem; color: #888; display: block; margin-top: 2px; }

    .radio-group { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
    .radio-group label {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.78rem;
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 12px;
      border: 1px solid #ddd;
      transition: background .12s, border-color .12s;
      white-space: nowrap;
    }
    .radio-group input[type="radio"] { display: none; }
    .radio-group label:has(input[value="pass"]:checked)  { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; font-weight: 600; }
    .radio-group label:has(input[value="fail"]:checked)  { background: #ffebee; border-color: #cc0000; color: #cc0000; font-weight: 600; }
    .radio-group label:has(input[value="na"]:checked)    { background: #f5f5f5; border-color: #aaa;    color: #666;    font-weight: 600; }

    /* ── Notes ── */
    .notes-row { margin-top: 10px; }
    .notes-row textarea {
      width: 100%; border: 1px solid #ddd; border-radius: 4px;
      padding: 6px 10px; font-size: 0.82rem; color: #333;
      resize: vertical; min-height: 48px; font-family: inherit;
      transition: border-color .15s;
    }
    .notes-row textarea:focus { outline: none; border-color: #1565C0; }
    .notes-label { font-size: 0.75rem; color: #888; margin-bottom: 4px; }

    /* ── Action bar ── */
    .action-bar {
      display: flex; gap: 10px; padding: 10px 20px;
      background: #f8f9fa;
      border-top: 1px solid #eee;
    }

    /* ── Buttons ── */
    .btn {
      padding: 6px 16px; border-radius: 5px; border: none;
      cursor: pointer; font-size: 0.82rem; font-weight: 600;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-blue    { background: #1565C0; color: #fff; }
    .btn-outline { background: #fff; color: #1565C0; border: 1.5px solid #1565C0; }
    .btn-danger  { background: #cc0000; color: #fff; }

    /* ── Summary table ── */
    #summary-section {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 20px;
      margin-bottom: 20px;
    }
    #summary-section h2 { font-size: 1rem; color: #1565C0; margin-bottom: 14px; border-bottom: 2px solid #1565C0; padding-bottom: 6px; }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .summary-card {
      border-radius: 6px;
      padding: 12px 14px;
      text-align: center;
    }
    .summary-card .sc-num  { font-size: 1.8rem; font-weight: 700; }
    .summary-card .sc-lbl  { font-size: 0.75rem; margin-top: 2px; }
    .card-total   { background: #E3F2FD; color: #1565C0; }
    .card-pass    { background: #e8f5e9; color: #2e7d32; }
    .card-fail    { background: #ffebee; color: #cc0000; }
    .card-na      { background: #f5f5f5; color: #666; }
    .card-pending { background: #fff8e1; color: #f57f17; }

    .fails-list { margin-top: 8px; }
    .fail-item {
      background: #ffebee; border-left: 3px solid #cc0000;
      padding: 7px 12px; border-radius: 0 4px 4px 0;
      margin-bottom: 5px; font-size: 0.82rem;
    }
    .fail-item strong { color: #cc0000; }

    /* ── Device badge ── */
    .device-badge {
      display: inline-block;
      background: #E3F2FD;
      color: #1565C0;
      border: 1px solid #90CAF9;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 8px;
    }

    /* ── Print ── */
    @media print {
      header, nav, .action-bar, .progress-bar-wrap,
      .btn, .radio-group { display: none !important; }
      .page-section.collapsed .page-body { display: block !important; }
      body { background: #fff; }
      main { padding: 0; }
    }

    /* ── Tooltip ── */
    .info-tip {
      display: inline-block; width: 14px; height: 14px;
      background: #1565C0; color: #fff;
      border-radius: 50%; font-size: 9px; text-align: center;
      line-height: 14px; cursor: help; flex-shrink: 0;
      margin-left: 4px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>📱 CPCBA — Mobile Accessibility Checklist</h1>
    <p>Mobile-specific checks — use alongside the automated report and desktop checklist</p>
  </div>
  <div class="header-right">
    <div class="meta-row">
      <div>
        <label for="tester-name">Tester</label>
        <input id="tester-name" type="text" placeholder="Your name" oninput="saveMeta()">
      </div>
      <div>
        <label for="test-date">Date</label>
        <input id="test-date" type="date" oninput="saveMeta()">
      </div>
      <div>
        <label for="device-tested">Device</label>
        <select id="device-tested" onchange="saveMeta()">
          <option value="">Select device…</option>
          <option value="iPhone 14 (iOS Safari)">iPhone 14 (iOS Safari)</option>
          <option value="iPhone SE (iOS Safari)">iPhone SE (iOS Safari)</option>
          <option value="Android Pixel 7 (Chrome)">Android Pixel 7 (Chrome)</option>
          <option value="Android Samsung Galaxy (Chrome)">Android Samsung Galaxy (Chrome)</option>
          <option value="iPad (Safari)">iPad (Safari)</option>
          <option value="DevTools iPhone emulation">DevTools iPhone emulation</option>
          <option value="DevTools Android emulation">DevTools Android emulation</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div>
        <label for="sprint-ref">Sprint / Release</label>
        <input id="sprint-ref" type="text" placeholder="e.g. Sprint 12" oninput="saveMeta()">
      </div>
    </div>
  </div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-label">
    <span id="progress-text">0 of 0 checks completed</span>
    <span id="fail-count-text" style="color:#ff8a80;"></span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="layout">

  <!-- Sidebar -->
  <nav>
    <h2>Pages</h2>
    <a class="nav-item" href="#summary-section" onclick="scrollTo('summary-section')">
      <span class="nav-dot"></span> Summary
    </a>
    <div id="nav-links"></div>
  </nav>

  <!-- Main -->
  <main id="main-content">

    <!-- Summary -->
    <div id="summary-section">
      <h2>📱 Mobile Accessibility Summary</h2>
      <div class="summary-grid">
        <div class="summary-card card-total">
          <div class="sc-num" id="sum-total">0</div>
          <div class="sc-lbl">Total Checks</div>
        </div>
        <div class="summary-card card-pass">
          <div class="sc-num" id="sum-pass">0</div>
          <div class="sc-lbl">Passed</div>
        </div>
        <div class="summary-card card-fail">
          <div class="sc-num" id="sum-fail">0</div>
          <div class="sc-lbl">Failed</div>
        </div>
        <div class="summary-card card-na">
          <div class="sc-num" id="sum-na">0</div>
          <div class="sc-lbl">N/A</div>
        </div>
        <div class="summary-card card-pending">
          <div class="sc-num" id="sum-pending">0</div>
          <div class="sc-lbl">Not yet checked</div>
        </div>
      </div>
      <div class="fails-list" id="fails-list"></div>
    </div>

    <!-- Page sections injected by JS -->
    <div id="pages-container"></div>

    <!-- Bottom actions -->
    <div style="display:flex; gap:10px; margin-top:8px; flex-wrap:wrap;">
      <button class="btn btn-outline" onclick="expandAll()">Expand all</button>
      <button class="btn btn-outline" onclick="collapseAll()">Collapse all</button>
      <button class="btn btn-blue"    onclick="window.print()">🖨 Print / Save PDF</button>
      <button class="btn btn-danger"  onclick="clearAll()">Reset all answers</button>
    </div>

  </main>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────────────

const PAGES = [
  { id: 'cpc-page',                    name: 'CPC Page',                     url: '/cpc' },
  { id: 'info-page',                   name: 'Info Page',                    url: '/cpc → Info button' },
  { id: 'my-basket-modal',             name: 'My Basket Modal',              url: 'Modal' },
  { id: 'sign-in-modal',               name: 'Sign In Modal',                url: 'Modal' },
  { id: 'details-and-payment',         name: 'Details & Payment',            url: '/checkout' },
  { id: 'details-and-payment-pay',     name: 'Details & Payment — Pay',      url: '/checkout' },
  { id: 'details-and-payment-verified',name: 'Details & Payment — Verified', url: '/checkout' },
  { id: 'pay-by-card',                 name: 'Pay by Card',                  url: '/checkout' },
  { id: 'booking-confirmation',        name: 'Booking Confirmation',         url: '/confirmation' },
  { id: 'add-attendees',               name: 'Add Attendees',                url: '/manage-delegates' },
  { id: 'add-attendee-edit-form',      name: 'Add Attendee — Edit Form',     url: 'Edit panel' },
  { id: 'view-booked-courses',         name: 'View Booked Courses',          url: '/booked-courses' },
  { id: 'user-profile',                name: 'User Profile',                 url: '/profile' },
  { id: 'sign-out-page',               name: 'Sign Out Page',                url: '/sign-out' },
];

const CATEGORIES = [
  {
    id: 'touch',
    icon: '👆',
    title: 'Touch Targets & Gestures',
    hint: 'WCAG 2.5.5 (AAA) requires 44×44px. WCAG 2.5.8 (AA, 2.2) requires 24×24px minimum. Test by attempting to tap small elements with a finger.',
    checks: [
      { id: 'tt-1', label: 'All interactive elements (buttons, links, inputs) have a touch target of at least 44×44 CSS pixels', hint: 'Use browser DevTools to inspect computed size. Icon-only buttons are the most common failure.' },
      { id: 'tt-2', label: 'Tappable elements are spaced far enough apart that adjacent items are not accidentally triggered', hint: 'A minimum 8px gap between interactive elements reduces misfire rate' },
      { id: 'tt-3', label: 'No functionality requires a multi-finger gesture (pinch, two-finger swipe) without a single-tap alternative (WCAG 2.5.1)', hint: 'Any gesture requiring two or more touch points must have an equivalent single-pointer action' },
      { id: 'tt-4', label: 'Drag-and-drop interactions (if any) have a single-tap or button alternative', hint: 'Pure drag-and-drop without an alternative is inaccessible to keyboard and many touch users' },
      { id: 'tt-5', label: 'No action is triggered on the "down" event alone without a way to cancel (WCAG 2.5.2)', hint: 'Actions should fire on "up" so the user can move their finger away to cancel the tap' },
    ],
  },
  {
    id: 'viewport',
    icon: '🔍',
    title: 'Viewport & Zoom',
    hint: 'Pinch-to-zoom must not be blocked. Test content reflow at 320px viewport width (WCAG 1.4.10).',
    checks: [
      { id: 'vp-1', label: 'Pinch-to-zoom is not disabled — viewport meta does not include user-scalable=no or maximum-scale=1 (WCAG 1.4.4)', hint: 'Open DevTools Sources and search for the viewport meta tag. Any restriction on scaling is a failure.' },
      { id: 'vp-2', label: 'Content reflows at 320px viewport width without requiring horizontal scrolling (WCAG 1.4.10)', hint: 'Set DevTools to 320px width. All content should stack vertically. Two-dimensional scrolling is a failure.' },
      { id: 'vp-3', label: 'Text can be enlarged to 200% using OS accessibility text size settings without content being cut off', hint: 'Enable Large Text in iOS/Android accessibility settings and reload the page' },
      { id: 'vp-4', label: 'Fixed or sticky headers/footers do not permanently obscure content or focused elements when zoomed in', hint: 'Zoom to 200% and tab through interactive elements — none should be hidden behind the sticky header' },
    ],
  },
  {
    id: 'orientation',
    icon: '↔️',
    title: 'Portrait & Landscape',
    hint: 'Content must not be restricted to one orientation (WCAG 1.3.4). Rotate the device during testing.',
    checks: [
      { id: 'or-1', label: 'The page is not locked to portrait or landscape orientation (WCAG 1.3.4)', hint: 'The page should not force a "please rotate your device" message unless essential to the content' },
      { id: 'or-2', label: 'Layout adapts correctly when switching between portrait and landscape without losing content', hint: 'Check that forms, modals, and tables reflow cleanly in both orientations' },
      { id: 'or-3', label: 'No content or functionality is hidden or inaccessible in either orientation', hint: 'Buttons that appear below the fold in one orientation must still be reachable without excessive scrolling' },
      { id: 'or-4', label: 'Forms remain fully usable in landscape — input fields and submit buttons are visible when the keyboard is open', hint: 'In landscape on a phone, the keyboard takes up much of the screen — the active field must remain visible' },
    ],
  },
  {
    id: 'keyboard-mobile',
    icon: '⌨️',
    title: 'On-Screen Keyboard',
    hint: 'Test on a real or emulated device by tapping into each input field and observing the keyboard that appears.',
    checks: [
      { id: 'kb-1', label: 'Email fields trigger the email keyboard (with @ key visible)', hint: 'input type="email" should be set. Sign In and profile forms are the key pages to check.' },
      { id: 'kb-2', label: 'Phone number fields trigger the numeric keyboard', hint: 'input type="tel" should be set on any phone number fields' },
      { id: 'kb-3', label: 'Payment card number and CVV fields trigger the numeric keyboard', hint: 'Stripe card inputs are in iframes — check that numeric keyboards appear on the Pay by Card page' },
      { id: 'kb-4', label: 'The active input field remains visible when the on-screen keyboard opens', hint: 'The page should scroll to keep the focused field above the keyboard. Modals are the most common failure.' },
      { id: 'kb-5', label: 'After dismissing the keyboard, the page returns to the correct scroll position', hint: 'On iOS, dismissing the keyboard sometimes causes the page to jump. The user should not lose their place.' },
      { id: 'kb-6', label: 'Autocomplete works correctly on login (email/password) and address fields', hint: 'autocomplete="email", "current-password", "street-address" etc. should be set. Password managers and autofill rely on this.' },
    ],
  },
  {
    id: 'screen-reader-mobile',
    icon: '🗣️',
    title: 'Mobile Screen Reader',
    hint: 'Use VoiceOver on iOS (triple-click side button) or TalkBack on Android (swipe gestures). Navigate by swiping right to move forward.',
    checks: [
      { id: 'sr-1', label: 'All content can be reached by swiping right through the page in a logical order', hint: 'Swipe right repeatedly from the top. Every piece of content should be announced in a sensible sequence.' },
      { id: 'sr-2', label: 'Buttons and links announce a descriptive name when focused (not just "button" or "link")', hint: 'Icon-only buttons must have aria-label. Links must not just say "click here".' },
      { id: 'sr-3', label: 'Modal dialogs announce their heading and trap swipe navigation within the modal', hint: 'When a modal opens, VoiceOver/TalkBack should move into the modal. Swiping should not reach content behind it.' },
      { id: 'sr-4', label: 'Form fields announce their label before the field type when focused by swipe', hint: 'Should say "Email address, text field" — not just "text field"' },
      { id: 'sr-5', label: 'Error messages are announced automatically when they appear after a failed submission', hint: 'Error text should use an ARIA live region so it is read without the user having to navigate back to it' },
      { id: 'sr-6', label: 'Page title is announced when navigating to a new page or route', hint: 'Each page/step should have a distinct, descriptive title that is announced on load' },
    ],
  },
  {
    id: 'navigation-mobile',
    icon: '🧭',
    title: 'Mobile Navigation & Layout',
    hint: 'Check navigation patterns that are unique to mobile — hamburger menus, bottom nav bars, and touch-only interactions.',
    checks: [
      { id: 'nm-1', label: 'Navigation menus can be opened and closed with a single tap', hint: 'Hamburger menus and dropdowns must not require hover or double-tap to activate' },
      { id: 'nm-2', label: 'No functionality is hidden behind a hover state that is inaccessible on touch', hint: 'Any tooltips or sub-menus triggered by mouse hover must also be accessible by tap' },
      { id: 'nm-3', label: 'Scrollable areas (e.g. horizontal course lists) have visible affordance and work with touch', hint: 'Horizontal scrollers should have visible scroll indicators. Momentum scrolling should feel natural.' },
      { id: 'nm-4', label: 'Pop-ups, modals, and toast notifications are accessible via screen reader on mobile', hint: 'Ensure modal overlays do not trap or block VoiceOver/TalkBack from accessing the content' },
      { id: 'nm-5', label: 'The site does not use a separate mobile URL or redirect that skips important content', hint: 'Responsive design is preferred. If a mobile URL exists, it must have full feature parity.' },
    ],
  },
  {
    id: 'motion-mobile',
    icon: '🎬',
    title: 'Motion & Device Interaction',
    hint: 'Test with iOS Reduce Motion or Android Remove Animations enabled to verify the site respects system settings.',
    checks: [
      { id: 'mm-1', label: 'Any feature triggered by device motion or orientation change has a UI control alternative (WCAG 2.5.4)', hint: 'e.g. shake-to-undo or tilt gestures must have an equivalent button or control' },
      { id: 'mm-2', label: 'Page animations and transitions are suppressed when the OS Reduce Motion setting is enabled', hint: 'Enable Reduce Motion in iOS Settings → Accessibility or Android Settings → Accessibility → Remove Animations' },
      { id: 'mm-3', label: 'No content flashes more than 3 times per second on the mobile viewport (WCAG 2.3.1)', hint: 'Loading spinners, skeleton screens, and ads must not flash at a rate that could trigger photosensitive responses' },
      { id: 'mm-4', label: 'Auto-playing video or animation does not start without user interaction on mobile', hint: 'Autoplay is often blocked by mobile browsers — check that the page does not break if autoplay is prevented' },
    ],
  },
];

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────

function buildCheckId(pageId, catId, checkId) {
  return `${pageId}__${catId}__${checkId}`;
}

function renderPages() {
  const container = document.getElementById('pages-container');
  const navLinks   = document.getElementById('nav-links');

  PAGES.forEach(page => {
    // Nav link
    const a = document.createElement('a');
    a.className = 'nav-item';
    a.id = `nav-${page.id}`;
    a.href = `#section-${page.id}`;
    a.innerHTML = `<span class="nav-dot" id="dot-${page.id}"></span> ${page.name}`;
    a.onclick = e => { e.preventDefault(); scrollToSection(page.id); };
    navLinks.appendChild(a);

    // Section
    const section = document.createElement('div');
    section.className = 'page-section';
    section.id = `section-${page.id}`;

    let categoriesHtml = '';
    CATEGORIES.forEach(cat => {
      let checksHtml = '';
      cat.checks.forEach(chk => {
        const fullId = buildCheckId(page.id, cat.id, chk.id);
        checksHtml += `
          <div class="check-row" id="row-${fullId}">
            <div class="check-label">
              ${chk.label}
              ${chk.hint ? `<span class="hint">${chk.hint}</span>` : ''}
            </div>
            <div class="radio-group">
              <label>
                <input type="radio" name="${fullId}" value="pass" onchange="saveCheck('${fullId}','pass')"> ✓ Pass
              </label>
              <label>
                <input type="radio" name="${fullId}" value="fail" onchange="saveCheck('${fullId}','fail')"> ✗ Fail
              </label>
              <label>
                <input type="radio" name="${fullId}" value="na" onchange="saveCheck('${fullId}','na')"> N/A
              </label>
            </div>
          </div>`;
      });

      categoriesHtml += `
        <div class="category">
          <div class="category-title">
            <span class="cat-icon">${cat.icon}</span> ${cat.title}
            <span class="info-tip" title="${cat.hint}">?</span>
          </div>
          ${checksHtml}
        </div>`;
    });

    // Notes
    const notesId = `notes-${page.id}`;
    categoriesHtml += `
      <div class="category">
        <div class="category-title">📌 Tester Notes</div>
        <div class="notes-row">
          <div class="notes-label">Device used, OS version, browser version, and any additional observations:</div>
          <textarea id="${notesId}" placeholder="e.g. Tested on iPhone 14 (iOS 17.2, Safari). Touch targets on 'Add to basket' button passed. On-screen keyboard obscured the OTP input field on Details & Payment page..." rows="3" oninput="saveNotes('${page.id}')"></textarea>
        </div>
      </div>`;

    section.innerHTML = `
      <div class="page-header" onclick="toggleSection('${page.id}')">
        <div>
          <h3>${page.name}</h3>
          <div class="page-meta">${page.url}</div>
        </div>
        <span class="toggle">▼</span>
      </div>
      <div class="page-body">
        ${categoriesHtml}
        <div class="action-bar">
          <button class="btn btn-outline" onclick="markAllPass('${page.id}')">Mark all Pass</button>
          <button class="btn btn-outline" onclick="markAllNA('${page.id}')">Mark all N/A</button>
        </div>
      </div>`;

    container.appendChild(section);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// STATE / STORAGE
// ─────────────────────────────────────────────────────────────────────────────

function storageKey(id) { return `cpcba_mobile_${id}`; }

function saveCheck(fullId, value) {
  localStorage.setItem(storageKey(fullId), value);
  updateProgress();
  updateNavDots();
  updateSummary();
}

function saveNotes(pageId) {
  const val = document.getElementById(`notes-${pageId}`).value;
  localStorage.setItem(storageKey(`notes-${pageId}`), val);
}

function saveMeta() {
  localStorage.setItem('cpcba_mobile_meta_tester',  document.getElementById('tester-name').value);
  localStorage.setItem('cpcba_mobile_meta_date',    document.getElementById('test-date').value);
  localStorage.setItem('cpcba_mobile_meta_device',  document.getElementById('device-tested').value);
  localStorage.setItem('cpcba_mobile_meta_sprint',  document.getElementById('sprint-ref').value);
}

function loadAll() {
  const tester = localStorage.getItem('cpcba_mobile_meta_tester');
  const date   = localStorage.getItem('cpcba_mobile_meta_date');
  const device = localStorage.getItem('cpcba_mobile_meta_device');
  const sprint = localStorage.getItem('cpcba_mobile_meta_sprint');
  if (tester) document.getElementById('tester-name').value   = tester;
  if (date)   document.getElementById('test-date').value     = date;
  if (device) document.getElementById('device-tested').value = device;
  if (sprint) document.getElementById('sprint-ref').value    = sprint;

  PAGES.forEach(page => {
    CATEGORIES.forEach(cat => {
      cat.checks.forEach(chk => {
        const fullId = buildCheckId(page.id, cat.id, chk.id);
        const stored = localStorage.getItem(storageKey(fullId));
        if (stored) {
          const radio = document.querySelector(`input[name="${fullId}"][value="${stored}"]`);
          if (radio) radio.checked = true;
        }
      });
    });
    const notes = localStorage.getItem(storageKey(`notes-${page.id}`));
    if (notes) document.getElementById(`notes-${page.id}`).value = notes;
  });

  updateProgress();
  updateNavDots();
  updateSummary();
}

function clearAll() {
  if (!confirm('Reset ALL answers and notes for every page? This cannot be undone.')) return;
  Object.keys(localStorage)
    .filter(k => k.startsWith('cpcba_mobile_'))
    .forEach(k => localStorage.removeItem(k));
  location.reload();
}

// ─────────────────────────────────────────────────────────────────────────────
// PROGRESS & SUMMARY
// ─────────────────────────────────────────────────────────────────────────────

function getAllChecks() {
  const results = [];
  PAGES.forEach(page => {
    CATEGORIES.forEach(cat => {
      cat.checks.forEach(chk => {
        const fullId = buildCheckId(page.id, cat.id, chk.id);
        const stored = localStorage.getItem(storageKey(fullId)) || 'pending';
        results.push({ fullId, pageId: page.id, pageName: page.name, catTitle: cat.title, label: chk.label, value: stored });
      });
    });
  });
  return results;
}

function updateProgress() {
  const all = getAllChecks();
  const answered = all.filter(c => c.value !== 'pending').length;
  const pct = all.length ? Math.round(answered / all.length * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${answered} of ${all.length} checks completed (${pct}%)`;
  const fails = all.filter(c => c.value === 'fail').length;
  document.getElementById('fail-count-text').textContent = fails > 0 ? `${fails} failed` : '';
}

function updateNavDots() {
  PAGES.forEach(page => {
    const checks = [];
    CATEGORIES.forEach(cat => {
      cat.checks.forEach(chk => {
        const fullId = buildCheckId(page.id, cat.id, chk.id);
        checks.push(localStorage.getItem(storageKey(fullId)) || 'pending');
      });
    });
    const hasFail    = checks.some(v => v === 'fail');
    const allDone    = checks.every(v => v !== 'pending');
    const someDone   = checks.some(v => v !== 'pending');
    const navItem    = document.getElementById(`nav-${page.id}`);
    navItem.classList.remove('done', 'partial', 'fail');
    if (hasFail)       navItem.classList.add('fail');
    else if (allDone)  navItem.classList.add('done');
    else if (someDone) navItem.classList.add('partial');
  });
}

function updateSummary() {
  const all = getAllChecks();
  const pass    = all.filter(c => c.value === 'pass').length;
  const fail    = all.filter(c => c.value === 'fail').length;
  const na      = all.filter(c => c.value === 'na').length;
  const pending = all.filter(c => c.value === 'pending').length;

  document.getElementById('sum-total').textContent   = all.length;
  document.getElementById('sum-pass').textContent    = pass;
  document.getElementById('sum-fail').textContent    = fail;
  document.getElementById('sum-na').textContent      = na;
  document.getElementById('sum-pending').textContent = pending;

  const failsList = document.getElementById('fails-list');
  failsList.innerHTML = '';
  const failures = all.filter(c => c.value === 'fail');
  if (failures.length) {
    failsList.innerHTML = `<div style="font-size:.82rem;font-weight:700;color:#cc0000;margin-bottom:6px;">Failed checks requiring attention:</div>`;
    failures.forEach(f => {
      failsList.innerHTML += `<div class="fail-item"><strong>${f.pageName} — ${f.catTitle}:</strong> ${f.label}</div>`;
    });
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────────────────────────────────────

function toggleSection(pageId) {
  document.getElementById(`section-${pageId}`).classList.toggle('collapsed');
}
function expandAll()   { document.querySelectorAll('.page-section').forEach(s => s.classList.remove('collapsed')); }
function collapseAll() { document.querySelectorAll('.page-section').forEach(s => s.classList.add('collapsed')); }

function scrollToSection(pageId) {
  document.getElementById(`section-${pageId}`).scrollIntoView({ behavior: 'smooth' });
  document.getElementById(`section-${pageId}`).classList.remove('collapsed');
  document.querySelectorAll('.nav-item').forEach(a => a.classList.remove('active'));
  document.getElementById(`nav-${pageId}`).classList.add('active');
}

function markAllPass(pageId) {
  CATEGORIES.forEach(cat => {
    cat.checks.forEach(chk => {
      const fullId = buildCheckId(pageId, cat.id, chk.id);
      const radio  = document.querySelector(`input[name="${fullId}"][value="pass"]`);
      if (radio) { radio.checked = true; saveCheck(fullId, 'pass'); }
    });
  });
}

function markAllNA(pageId) {
  CATEGORIES.forEach(cat => {
    cat.checks.forEach(chk => {
      const fullId = buildCheckId(pageId, cat.id, chk.id);
      const radio  = document.querySelector(`input[name="${fullId}"][value="na"]`);
      if (radio) { radio.checked = true; saveCheck(fullId, 'na'); }
    });
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────

renderPages();
loadAll();
</script>
